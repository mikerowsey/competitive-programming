name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Debug)
        run: cmake --preset debug

      - name: Build (Debug)
        run: cmake --build --preset debug

      - name: Test (Debug)
        run: ctest --preset debug

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: ./scripts/check_format.sh --all

  clang-tidy:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure (clang-tidy Linux GCC)
        run: cmake --preset clang-tidy-linux-gcc

      - name: Run clang-tidy checks (changed files)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          ./scripts/run_clang_tidy_reports.sh \
            --changed-only \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --build-dir build/clang-tidy-linux-gcc \
            --fail-on-warnings

  asan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (ASan/UBSan)
        run: cmake --preset asan

      - name: Build (ASan/UBSan)
        run: cmake --build --preset asan

      - name: Test (ASan/UBSan)
        run: ctest --preset asan

  perf-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Perf)
        run: cmake --preset perf

      - name: Build (Perf)
        run: cmake --build --preset perf

      - name: Test (Perf label)
        run: ctest --preset perf

  clang-tidy-weekly-report:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure (clang-tidy Linux GCC)
        run: cmake --preset clang-tidy-linux-gcc

      - name: Generate clang-tidy reports
        run: ./scripts/run_clang_tidy_reports.sh --all --build-dir build/clang-tidy-linux-gcc --report-file build/clang-tidy-linux-gcc/clang-tidy-report.txt

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-reports
          path: build/clang-tidy-linux-gcc/clang-tidy-report.txt
          retention-days: 30
