name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Debug)
        run: cmake --preset debug

      - name: Build (Debug)
        run: cmake --build --preset debug

      - name: Test (Debug)
        run: ctest --preset debug

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: ./scripts/check_format.sh

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure (clang-tidy)
        run: cmake --preset clang-tidy

      - name: Build (clang-tidy)
        run: cmake --build --preset clang-tidy

  asan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (ASan/UBSan)
        run: cmake --preset asan

      - name: Build (ASan/UBSan)
        run: cmake --build --preset asan

      - name: Test (ASan/UBSan)
        run: ctest --preset asan

  perf-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Perf)
        run: cmake --preset perf

      - name: Build (Perf)
        run: cmake --build --preset perf

      - name: Test (Perf label)
        run: ctest --preset perf
