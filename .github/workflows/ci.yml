name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Debug)
        run: cmake --preset debug

      - name: Build (Debug)
        run: cmake --build --preset debug

      - name: Test (Debug)
        run: ctest --preset debug

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: ./scripts/check_format.sh --all

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure (clang-tidy)
        run: cmake --preset clang-tidy

      - name: Build (clang-tidy)
        run: cmake --build --preset clang-tidy

      - name: Run clang-tidy checks
        run: |
          echo "Running clang-tidy on all source files..."
          WARNING_COUNT=0
          for file in $(find src/cses -name "*.cpp" -type f); do
            OUTPUT=$(clang-tidy "$file" -p build/clang-tidy 2>&1 || true)
            if echo "$OUTPUT" | grep -q "warning:"; then
              echo "⚠️  Warnings in $file"
              echo "$OUTPUT" | grep "warning:"
              WARNING_COUNT=$((WARNING_COUNT + 1))
            fi
          done

          if [ $WARNING_COUNT -gt 0 ]; then
            echo ""
            echo "❌ clang-tidy found warnings in $WARNING_COUNT file(s). Fix before merging."
            exit 1
          else
            echo "✅ No clang-tidy warnings found."
          fi

  asan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (ASan/UBSan)
        run: cmake --preset asan

      - name: Build (ASan/UBSan)
        run: cmake --build --preset asan

      - name: Test (ASan/UBSan)
        run: ctest --preset asan

  perf-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Perf)
        run: cmake --preset perf

      - name: Build (Perf)
        run: cmake --build --preset perf

      - name: Test (Perf label)
        run: ctest --preset perf

  clang-tidy-weekly-report:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure (clang-tidy)
        run: cmake --preset clang-tidy

      - name: Build (clang-tidy)
        run: cmake --build --preset clang-tidy

      - name: Generate clang-tidy reports
        run: |
          echo "Generating per-problem clang-tidy reports..."
          for dir in src/cses/*/; do
            PROBLEM_NAME=$(basename "$dir")
            REPORT_FILE="$dir/clang-tidy.txt"
            CPP_FILE="$dir/${PROBLEM_NAME}.cpp"

            if [ -f "$CPP_FILE" ]; then
              echo "📊 Generating report for $PROBLEM_NAME..."
              clang-tidy "$CPP_FILE" -p build/clang-tidy > "$REPORT_FILE" 2>&1 || true
            fi
          done
          echo "✅ Reports generated in each problem directory."

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-reports
          path: src/cses/**/clang-tidy.txt
          retention-days: 30
